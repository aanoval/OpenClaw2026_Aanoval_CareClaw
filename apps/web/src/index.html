<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fff4df" />
    <meta name="description" content="CareClaw helps patients prepare a doctor consultation from their phone." />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
    <title>CareClaw</title>
  </head>
  <body>
    <div class="desktop-shell">
      <main class="phone" aria-label="CareClaw app">
        <header class="topbar">
          <div>
            <p class="eyebrow">CareClaw</p>
            <h1 id="pageTitle">Ceritakan keluhan</h1>
          </div>
          <div class="status-pill" id="stagePill">Tamu</div>
        </header>

        <section class="mini-status" id="miniStatus">
          <strong id="sceneTitle">Mulai chat</strong>
          <span id="sceneText">Jawab singkat saja. Dokter akan melihat ringkasannya.</span>
        </section>

        <section class="screen patient-screen" id="patientPanel">
          <section class="tab-view" data-tab-view="chat">
            <div class="chat-log" id="chatLog" aria-live="polite"></div>
            <div id="quickChoices" class="quick-choices hidden"></div>
            <div id="paymentChoices" class="payment-choices hidden"></div>
            <div id="paymentResult" class="payment-result hidden"></div>
            <div class="composer">
              <textarea id="patientMessage" placeholder="Tulis keluhan Anda..."></textarea>
              <button id="startConsultation" type="button">Kirim</button>
            </div>
            <div class="compact-actions">
              <button id="mockVoice" type="button" class="secondary">Voice</button>
              <button id="createPayment" type="button" class="payment-button hidden">Bayar</button>
            </div>
          </section>

          <section class="tab-view hidden" data-tab-view="doctor">
            <div class="empty-state" id="doctorPatientState">
              <strong>Belum ada dokter</strong>
              <span>Selesaikan chat awal dan pembayaran untuk masuk antrean.</span>
            </div>
          </section>

          <section class="tab-view hidden" data-tab-view="history">
            <div id="historyGate" class="empty-state">
              <strong>Masuk dulu</strong>
              <span>Riwayat chat dan pembayaran tersimpan setelah Anda login.</span>
            </div>
            <div id="historyList" class="history-list hidden"></div>
          </section>

          <section class="tab-view hidden" data-tab-view="account">
            <div id="accountCard" class="account-card"></div>
            <div id="authForms" class="auth-forms">
              <div class="auth-tabs">
                <button id="showLogin" type="button" class="secondary active">Login</button>
                <button id="showRegister" type="button" class="secondary">Daftar</button>
              </div>
              <div id="loginForm" class="form-stack">
                <input id="loginEmail" inputmode="email" autocomplete="email" placeholder="email@gmail.com" />
                <input id="loginPassword" autocomplete="current-password" type="password" placeholder="Password" />
                <button id="patientLogin" type="button">Masuk</button>
              </div>
              <div id="registerForm" class="form-stack hidden">
                <input id="registerEmail" inputmode="email" autocomplete="email" placeholder="email@gmail.com" />
                <input id="registerPassword" autocomplete="new-password" type="password" placeholder="Password" />
                <input id="registerConfirm" autocomplete="new-password" type="password" placeholder="Ulangi password" />
                <button id="patientRegister" type="button">Daftar</button>
              </div>
            </div>
          </section>
        </section>

        <section class="panel doctor-panel hidden" id="doctorPanel">
          <div id="doctorLoginPanel">
            <label for="doctorUser">Akses dokter</label>
            <div class="login-grid">
              <input id="doctorUser" autocomplete="username" placeholder="Username dokter" />
              <input id="doctorPass" autocomplete="current-password" type="password" placeholder="Password" />
              <button id="doctorLogin" type="button">Masuk</button>
            </div>
          </div>

          <div id="doctorWorkspace" class="hidden">
            <div class="doctor-header">
              <div>
                <p class="label">Antrian</p>
                <h2 id="doctorTitle">Pasien menunggu</h2>
              </div>
              <button id="refreshQueue" type="button" class="secondary">Refresh</button>
            </div>
            <div id="doctorQueue" class="doctor-queue"></div>
            <div id="doctorCase" class="doctor-case hidden">
              <div id="doctorSummary" class="doctor-summary"></div>
              <div id="doctorChatLog" class="chat-log doctor-chat-log"></div>
              <div id="doctorSuggestions" class="doctor-suggestions"></div>
              <textarea id="doctorMessage" placeholder="Tulis pesan dokter ke pasien..."></textarea>
              <div class="actions">
                <button id="sendDoctorMessage" type="button">Kirim</button>
                <button id="endConsultation" type="button" class="secondary">Selesai</button>
              </div>
            </div>
          </div>
        </section>

        <nav class="bottom-nav" id="patientNav" aria-label="Navigasi pasien">
          <button type="button" data-tab="chat" class="active">Chat</button>
          <button type="button" data-tab="doctor">Dokter</button>
          <button type="button" data-tab="history">Riwayat</button>
          <button type="button" data-tab="account">Akun</button>
        </nav>
      </main>
    </div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
