services:
  careclaw-web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8070:80"

  careclaw-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    env_file:
      - .env.openclaw
      - .env.doku
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 8050
      DOCTOR_USERNAME: doctor
      DOCTOR_PASSWORD: careclaw2026
    ports:
      - "127.0.0.1:8050:8050"

  careclaw-openclaw:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.openclaw
    restart: unless-stopped
    env_file:
      - .env.openclaw
    environment:
      OPENCLAW_GATEWAY_PORT: 18790
      OPENCLAW_MODEL_PROVIDER: sumopod
      OPENCLAW_MODEL_ID: gpt-4o-mini
    ports:
      - "127.0.0.1:18790:18790"

  careclaw-agents-check:
    build:
      context: ..
      dockerfile: Dockerfile
    profiles: ["check"]
    command: npm run demo:agents

  careclaw-openclaw-check:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.openclaw
    profiles: ["check"]
    env_file:
      - .env.openclaw
    environment:
      OPENCLAW_MODEL_PROVIDER: sumopod
      OPENCLAW_MODEL_ID: gpt-4o-mini
    command: agent-check
