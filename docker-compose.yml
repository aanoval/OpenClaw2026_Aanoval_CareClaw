services:
  careclaw-agents:
    build: .
    environment:
      NODE_ENV: production
    command: sh -c 'if [ -n "$$AGENT_NAME" ]; then npm run demo:container-agent; else npm run demo:agents; fi'
  careclaw-orchestrator:
    build: .
    profiles: ["agents"]
    environment:
      NODE_ENV: production
      AGENT_NAME: orchestrator
  careclaw-intake:
    build: .
    profiles: ["agents"]
    environment:
      NODE_ENV: production
      AGENT_NAME: intake
  careclaw-payment:
    build: .
    profiles: ["agents"]
    environment:
      NODE_ENV: production
      AGENT_NAME: payment
